<div class="modal-content">
  <div class="modal-header">
    <h2 class="modal-title">{{project.name}}</h2>
    <button class="btn-close" (click)="closeProjectModal()"></button>
  </div>
  <div class="modal-body">
    <app-carousel [images]="project.images"></app-carousel>
    <h3 class="mt-3">Descripción</h3>
    <p>{{project.description}}</p>
    <p>Podes ver este projecto <a [href]="project.projectLink" target="_blank">Acá</a></p>
    <hr>
    <div class="d-flex flex-wrap">
      <div *ngFor="let tag of project.technologies">
        <div class="tag me-2 mb-1" [style.background-color]="tag.color">{{tag}}</div>
      </div>
    </div>
  </div>
</div>
