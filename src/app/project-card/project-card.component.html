<div class="card text-center project-card">
  <div class="card-img-wrapper">
    <img *ngIf="project.images.length" [src]="project.images[0]" [alt]="project.name" class="card-preview-img">
    <div *ngIf="!project.images.length" class="card-no-img">
      <span>// sin preview</span>
    </div>
  </div>
  <div class="card-body">
    <h5 class="card-title">{{project.name}}</h5>
    <p class="card-text">{{project.summary}}</p>
    <button class="btn btn-primary" (click)="openProjectModal()">Ver proyecto</button>
  </div>
  <div class="card-footer">
    <div class="d-flex flex-wrap justify-content-center">
      <div *ngFor="let tag of project.technologies">
        <div class="tag me-2 mb-1" [style.background-color]="tag.color">{{tag}}</div>
      </div>
    </div>
  </div>
</div>
