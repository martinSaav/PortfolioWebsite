<div class="carousel-container position-relative overflow-hidden rounded">
  <div *ngIf="images.length > 0; else noImages">
    <img [src]="images[currentIndex]" alt="project image" class="d-block w-100 carousel-img">
  </div>

  <ng-template #noImages>
    <div class="d-flex align-items-center justify-content-center bg-secondary text-white carousel-img">
      <span>{{ 'CAROUSEL.NO_IMAGES' | translate }}</span>
    </div>
  </ng-template>

  <ng-container *ngIf="images.length > 1">
    <button class="carousel-control-prev" type="button" (click)="prev()">
      <span class="carousel-control-prev-icon" aria-hidden="true"></span>
      <span class="visually-hidden">{{ 'CAROUSEL.PREV' | translate }}</span>
    </button>
    <button class="carousel-control-next" type="button" (click)="next()">
      <span class="carousel-control-next-icon" aria-hidden="true"></span>
      <span class="visually-hidden">{{ 'CAROUSEL.NEXT' | translate }}</span>
    </button>

    <div class="carousel-indicators-custom">
      <button
        *ngFor="let img of images; let i = index"
        type="button"
        class="indicator-dot"
        [class.active]="i === currentIndex"
        (click)="goTo(i)">
      </button>
    </div>
  </ng-container>
</div>
